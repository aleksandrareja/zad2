name: CI/CD Multi-Arch Pipeline with CVE Scan

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' 
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #pelne wsparcie cache dla etapu testowego
      - name: Build local image for CVE scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true 
          tags: local-test-image:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      #tagowanie dynamiczne (Semver lub latest)
      - name: Build and push Multi-Arch Image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zad2:multiarch
            ghcr.io/${{ github.repository_owner }}/zad2:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest,mode=max