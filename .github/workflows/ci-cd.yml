name: CI/CD Multi-Arch Pipeline with CVE Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Pozwala na ręczne uruchomienie potoku z poziomu strony WWW

permissions:
  contents: read
  packages: write # Wymagane, aby GitHub Actions mogło wysłać obraz do ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu źródłowego z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Logowanie do Docker Hub (na potrzeby przechowywania danych cache)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Logowanie do GitHub Container Registry (ghcr.io)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Konfiguracja emulatora QEMU (wymagane do budowania obrazów arm64 na maszynie amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 5. Konfiguracja zaawansowanego Buildera (odpowiednik sterownika docker-container)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. ETAP TESTOWY: Budowanie lokalnego obrazu na architekturę amd64 w celu przeprowadzenia skanu CVE
      - name: Build local image for CVE scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Ładuje obraz lokalnie do demona Dockera (zamiast wysyłać do rejestru)
          tags: local-test-image:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest

      # 7. SKANOWANIE CVE (Trivy) - Blokuje potok, jeśli wykryje podatności CRITICAL lub HIGH
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '1' # Zwraca kod błędu 1, co przerywa działanie potoku w przypadku znalezienia podatności
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 8. ETAP DOCELOWY: Budowanie Multi-Arch i wysyłka do ghcr.io (wykona się TYLKO jeśli krok 7 zakończy się sukcesem)
      - name: Build and push Multi-Arch Image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zad2:multiarch
            ghcr.io/${{ github.repository_owner }}/zad2:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:latest,mode=max